<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Selecciones
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title color="primary" size="large">Selecciones <ion-icon name="football-outline"></ion-icon></ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>
    <ion-searchbar animated="true" placeholder="Buscar selección" [(ngModel)]="filtro"></ion-searchbar>
    <br>

    <ion-list *ngIf="datosIntl">
      <ion-list-header>
        <ion-label>Selecciones nacionales</ion-label>
      </ion-list-header>
      <ion-item *ngFor="let equipo of datosIntl | filter:filtro" (click)="presentAlert(equipo)">
        <ion-label>{{equipo.Name}}</ion-label>
        <p style="font-size: small;">{{equipo.ShortName}}</p>
        <ion-img style="width: 10%;"
          src="{{equipo.ImageURL}}"
          alt="{{equipo.Name}}">
        </ion-img>
      </ion-item>
    </ion-list>

  </ion-content>
</ion-content>
