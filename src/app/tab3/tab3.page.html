<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Mis Avistamientos
    </ion-title>
    <ion-buttons slot="end">
      <ion-button color="danger" (click)="limpiarHistorial()">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title color="primary" size="large">Mis Avistamientos <ion-icon name="stats-chart-outline"></ion-icon></ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>
    <ion-searchbar animated="true" placeholder="Buscar equipo" [(ngModel)]="filtro"></ion-searchbar>
    <br>

    <ion-list *ngIf="datosVistos && datosVistos.length > 0">
      <ion-list-header>
        <ion-label>Equipo</ion-label>
        <ion-label>Veces <ion-icon name="eye-outline"></ion-icon></ion-label>
        <ion-label>Escudo</ion-label>
      </ion-list-header>

      <ion-item *ngFor="let equipo of datosVistos | filterr:filtro">
        <ion-label>
          {{equipo.Name}}
          <p>{{equipo.FechaUltimo | date:'dd/MM/yyyy'}}</p>
        </ion-label>
        <ion-badge color="primary" slot="end">{{equipo.Cantidad}}</ion-badge>
        <ion-img style="width: 10%; margin-left: 8px;"
          src="{{equipo.ImageURL}}"
          alt="{{equipo.Name}}">
        </ion-img>
      </ion-item>
    </ion-list>

    <ion-text *ngIf="!datosVistos || datosVistos.length === 0" color="medium">
      <p style="text-align: center; margin-top: 40px;">
        <ion-icon name="shirt-outline" style="font-size: 48px;"></ion-icon><br>
        Todavía no registraste ninguna camiseta.
      </p>
    </ion-text>

  </ion-content>
</ion-content>
